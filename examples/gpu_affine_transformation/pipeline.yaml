- name: affine_transform_matrix
  shape:
  - 1000
  - 1000
  dtype: float32
  storage: gpu
  gpu_device: cuda:0
  cpu_mirror: true
- name: affine_offset_vector
  shape:
  - 1000
  dtype: float32
  storage: gpu
  gpu_device: cuda:0
- name: affine_output_vector
  shape:
  - 1000
  dtype: float32
  storage: gpu
  gpu_device: cuda:0
  cpu_mirror: true
kernels:
- name: affine_stage
  kind: gpu.affine_transform
  input: affine_input_vector
  output: affine_output_vector
