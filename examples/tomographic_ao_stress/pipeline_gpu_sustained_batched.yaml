shared_memory:
  - name: tomo_wfs_cube_raw
    shape: [8, 256, 256]
    dtype: float32
    storage: gpu
    gpu_device: cuda:0
  - name: tomo_wfs_dark
    shape: [8, 256, 256]
    dtype: float32
    storage: gpu
    gpu_device: cuda:0
  - name: tomo_wfs_inverse_flat
    shape: [8, 256, 256]
    dtype: float32
    storage: gpu
    gpu_device: cuda:0
  - name: tomo_wfs_slope_offset
    shape: [8, 64, 64, 2]
    dtype: float32
    storage: gpu
    gpu_device: cuda:0
  - name: tomo_reconstructor
    shape: [4096, 65536]
    dtype: float32
    storage: gpu
    gpu_device: cuda:0
  - name: tomo_reconstructor_bias
    shape: [4096]
    dtype: float32
    storage: gpu
    gpu_device: cuda:0
  - name: tomo_command_offset
    shape: [4096]
    dtype: float32
    storage: gpu
    gpu_device: cuda:0
  - name: tomo_command_low
    shape: [4096]
    dtype: float32
    storage: gpu
    gpu_device: cuda:0
  - name: tomo_command_high
    shape: [4096]
    dtype: float32
    storage: gpu
    gpu_device: cuda:0
  - name: tomo_dm_command
    shape: [4096]
    dtype: float32
    storage: gpu
    gpu_device: cuda:0
  - name: tt_a_image
    shape: [16, 16]
    dtype: float32
    storage: cpu
  - name: tt_a_rotation
    shape: [2, 2]
    dtype: float32
    storage: cpu
  - name: tt_a_bias
    shape: [2]
    dtype: float32
    storage: cpu
  - name: tt_a_command
    shape: [2]
    dtype: float32
    storage: cpu
  - name: tt_b_image
    shape: [16, 16]
    dtype: float32
    storage: cpu
  - name: tt_b_rotation
    shape: [2, 2]
    dtype: float32
    storage: cpu
  - name: tt_b_bias
    shape: [2]
    dtype: float32
    storage: cpu
  - name: tt_b_command
    shape: [2]
    dtype: float32
    storage: cpu

kernels:
  - name: tomo_fused_batched_controller
    kind: gpu.tomographic_controller
    input: tomo_wfs_cube_raw
    trigger_policy: all_new
    output: tomo_dm_command
    auxiliary:
      wfs_dark: tomo_wfs_dark
      wfs_inverse_flat: tomo_wfs_inverse_flat
      wfs_slope_offset: tomo_wfs_slope_offset
      reconstructor: tomo_reconstructor
      reconstructor_bias: tomo_reconstructor_bias
      command_offset: tomo_command_offset
      command_low: tomo_command_low
      command_high: tomo_command_high
    parameters:
      tile_size: 4
      slope_gain: 1.0
      leak: 0.985
      control_gain: 0.28
      command_gain: 1.0
    read_timeout: 1.0

  - name: tt_a_fused_controller
    kind: cpu.tip_tilt_controller
    input: tt_a_image
    output: tt_a_command
    auxiliary: [tt_a_rotation, tt_a_bias]
    parameters:
      background: 0.0
      threshold: 0.0
      leak: 0.97
      control_gain: 0.35
    read_timeout: 0.1

  - name: tt_b_fused_controller
    kind: cpu.tip_tilt_controller
    input: tt_b_image
    output: tt_b_command
    auxiliary: [tt_b_rotation, tt_b_bias]
    parameters:
      background: 0.0
      threshold: 0.0
      leak: 0.94
      control_gain: 0.22
    read_timeout: 0.1


