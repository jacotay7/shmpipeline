    kind: cpu.scale_offset
    input: tomo_wfs5_centroids
    output: tomo_wfs5_corrected_centroids
    auxiliary: [tomo_wfs5_slope_offset]
    parameters:
      gain: 1.0
    read_timeout: 0.1

