  - name: tomo_wfs6_calibration
    kind: cpu.custom_operation
    operation: (input - dark) * inverse_flat
    input: tomo_wfs6_raw
    output: tomo_wfs6_calibrated
    auxiliary:
      dark: tomo_wfs6_dark
      inverse_flat: tomo_wfs6_inverse_flat
    read_timeout: 0.1

  - name: tomo_wfs6_centroid
    kind: cpu.shack_hartmann_centroid
    input: tomo_wfs6_calibrated
    output: tomo_wfs6_centroids
    parameters:
      tile_size: 4
    read_timeout: 0.1

  - name: tomo_wfs6_slope_calibration
    kind: cpu.scale_offset
    input: tomo_wfs6_centroids
    output: tomo_wfs6_corrected_centroids
    auxiliary: [tomo_wfs6_slope_offset]
    parameters:
      gain: 1.0
    read_timeout: 0.1

  - name: tomo_wfs6_flatten
    kind: cpu.flatten
    input: tomo_wfs6_corrected_centroids
