    read_timeout: 0.1

  - name: tomo_wfs7_calibration
    kind: cpu.custom_operation
    operation: (input - dark) * inverse_flat
    input: tomo_wfs7_raw
    output: tomo_wfs7_calibrated
    auxiliary:
      dark: tomo_wfs7_dark
      inverse_flat: tomo_wfs7_inverse_flat
    read_timeout: 0.1

  - name: tomo_wfs7_centroid
    kind: cpu.shack_hartmann_centroid
    input: tomo_wfs7_calibrated
    output: tomo_wfs7_centroids
    parameters:
      tile_size: 4
    read_timeout: 0.1

  - name: tomo_wfs7_slope_calibration
    kind: cpu.scale_offset
    input: tomo_wfs7_centroids
    output: tomo_wfs7_corrected_centroids
    auxiliary: [tomo_wfs7_slope_offset]
    parameters:
      gain: 1.0
    read_timeout: 0.1

  - name: tomo_wfs7_flatten
    kind: cpu.flatten
    input: tomo_wfs7_corrected_centroids
    output: tomo_wfs7_slopes
    read_timeout: 0.1

  - name: tomo_synchronized_concatenate
    kind: cpu.concatenate
    inputs: [tomo_wfs0_slopes, tomo_wfs1_slopes, tomo_wfs2_slopes, tomo_wfs3_slopes, tomo_wfs4_slopes, tomo_wfs5_slopes, tomo_wfs6_slopes, tomo_wfs7_slopes]
    trigger_policy: all_new
    output: tomo_all_slopes
    parameters:
      axis: 0
    read_timeout: 0.1

  - name: tomo_reconstruction
    kind: cpu.affine_transform
    input: tomo_all_slopes
    output: tomo_residual_command
    auxiliary: [tomo_reconstructor, tomo_reconstructor_bias]
    parameters:
      blas_threads: 1
    read_timeout: 1.0

  - name: tomo_closed_loop_integrator
    kind: cpu.leaky_integrator
    input: tomo_residual_command
    output: tomo_integrated_command
    parameters:
      leak: 0.985
      gain: 0.28
    read_timeout: 0.1

  - name: tomo_command_calibration
    kind: cpu.scale_offset
    input: tomo_integrated_command
    output: tomo_calibrated_command
    auxiliary: [tomo_command_offset]
    parameters:
      gain: 1.0
    read_timeout: 0.1

  - name: tomo_command_bounds
    kind: cpu.custom_operation
    operation: clip(input, low, high)
    input: tomo_calibrated_command
    output: tomo_dm_command
    auxiliary:
      low: tomo_command_low
      high: tomo_command_high
    read_timeout: 0.1

  - name: tt_a_centroid_stage
    kind: cpu.spot_centroid
    input: tt_a_image
    output: tt_a_centroid
    parameters:
      threshold: 0.0
      background: 0.0
      weight_power: 1.0
    read_timeout: 0.1

  - name: tt_a_closed_loop_integrator
    kind: cpu.leaky_integrator
    input: tt_a_centroid
    output: tt_a_integrated
    parameters:
      leak: 0.97
      gain: 0.35
    read_timeout: 0.1

  - name: tt_a_rotation
    kind: cpu.affine_transform
    input: tt_a_integrated
    output: tt_a_command
    auxiliary: [tt_a_rotation, tt_a_bias]
    parameters:
      blas_threads: 1
    read_timeout: 0.1

  - name: tt_b_centroid_stage
    kind: cpu.spot_centroid
    input: tt_b_image
    output: tt_b_centroid
    parameters:
      threshold: 0.0
      background: 0.0
      weight_power: 1.0
    read_timeout: 0.1

  - name: tt_b_closed_loop_integrator
    kind: cpu.leaky_integrator
    input: tt_b_centroid
    output: tt_b_integrated
    parameters:
      leak: 0.94
      gain: 0.22
    read_timeout: 0.1

  - name: tt_b_rotation
    kind: cpu.affine_transform
    input: tt_b_integrated
    output: tt_b_command
    auxiliary: [tt_b_rotation, tt_b_bias]
    parameters:
      blas_threads: 1
    read_timeout: 0.1


