kernels:
  - name: tomo_wfs0_calibration
    kind: cpu.custom_operation
    operation: (input - dark) * inverse_flat
    input: tomo_wfs0_raw
    output: tomo_wfs0_calibrated
    auxiliary:
      dark: tomo_wfs0_dark
      inverse_flat: tomo_wfs0_inverse_flat
    read_timeout: 0.1

  - name: tomo_wfs0_centroid
    kind: cpu.shack_hartmann_centroid
    input: tomo_wfs0_calibrated
    output: tomo_wfs0_centroids
    parameters:
      tile_size: 4
    read_timeout: 0.1

  - name: tomo_wfs0_slope_calibration
    kind: cpu.scale_offset
    input: tomo_wfs0_centroids
    output: tomo_wfs0_corrected_centroids
    auxiliary: [tomo_wfs0_slope_offset]
    parameters:
      gain: 1.0
    read_timeout: 0.1

  - name: tomo_wfs0_flatten
    kind: cpu.flatten
    input: tomo_wfs0_corrected_centroids
    output: tomo_wfs0_slopes
    read_timeout: 0.1

  - name: tomo_wfs1_calibration
