sources:
  - name: wfs_cameras
    kind: synthetic.frame_set
    streams: [tomo_wfs0_raw, tomo_wfs1_raw, tomo_wfs2_raw, tomo_wfs3_raw, tomo_wfs4_raw, tomo_wfs5_raw, tomo_wfs6_raw, tomo_wfs7_raw]
    parameters:
      pattern: random
      seed: 2401
      rate_hz: null
      jitter_us: 0.0
      assign_frame_id: true
  - name: tt_a_source
    kind: synthetic.array
    stream: tt_a_image
    parameters:
      pattern: random
      seed: 11
      rate_hz: 700.0
  - name: tt_b_source
    kind: synthetic.array
    stream: tt_b_image
    parameters:
      pattern: random
      seed: 12
      rate_hz: 233.0

kernels:
  - name: tomo_controller
    kind: cpu.tomographic_controller
    inputs:
      - tomo_wfs0_raw
      - tomo_wfs1_raw
      - tomo_wfs2_raw
      - tomo_wfs3_raw
      - tomo_wfs4_raw
      - tomo_wfs5_raw
      - tomo_wfs6_raw
      - tomo_wfs7_raw
    trigger_policy: all_new
    synchronization:
      mode: matching_frame_id
      max_skew_generations: 32
      max_wait_s: 0.050
    output: tomo_dm_command
    auxiliary:
      wfs0_dark: tomo_wfs0_dark
      wfs0_inverse_flat: tomo_wfs0_inverse_flat
      wfs0_slope_offset: tomo_wfs0_slope_offset
      wfs1_dark: tomo_wfs1_dark
      wfs1_inverse_flat: tomo_wfs1_inverse_flat
      wfs1_slope_offset: tomo_wfs1_slope_offset
      wfs2_dark: tomo_wfs2_dark
      wfs2_inverse_flat: tomo_wfs2_inverse_flat
      wfs2_slope_offset: tomo_wfs2_slope_offset
      wfs3_dark: tomo_wfs3_dark
      wfs3_inverse_flat: tomo_wfs3_inverse_flat
      wfs3_slope_offset: tomo_wfs3_slope_offset
      wfs4_dark: tomo_wfs4_dark
      wfs4_inverse_flat: tomo_wfs4_inverse_flat
      wfs4_slope_offset: tomo_wfs4_slope_offset
      wfs5_dark: tomo_wfs5_dark
      wfs5_inverse_flat: tomo_wfs5_inverse_flat
      wfs5_slope_offset: tomo_wfs5_slope_offset
      wfs6_dark: tomo_wfs6_dark
      wfs6_inverse_flat: tomo_wfs6_inverse_flat
      wfs6_slope_offset: tomo_wfs6_slope_offset
      wfs7_dark: tomo_wfs7_dark
      wfs7_inverse_flat: tomo_wfs7_inverse_flat
      wfs7_slope_offset: tomo_wfs7_slope_offset
      reconstructor: tomo_reconstructor
      reconstructor_bias: tomo_reconstructor_bias
      command_offset: tomo_command_offset
      command_low: tomo_command_low
      command_high: tomo_command_high
    parameters:
      tile_size: 4
      slope_gain: 1.0
      leak: 0.985
      control_gain: 0.28
      command_gain: 1.0
    read_timeout: 1.0
  - name: tt_a_controller
    kind: cpu.tip_tilt_controller
    input: tt_a_image
    output: tt_a_command
    auxiliary: [tt_a_rotation, tt_a_bias]
    parameters:
      background: 0.0
      threshold: 0.0
      leak: 0.97
      control_gain: 0.35
    read_timeout: 0.1
  - name: tt_b_controller
    kind: cpu.tip_tilt_controller
    input: tt_b_image
    output: tt_b_command
    auxiliary: [tt_b_rotation, tt_b_bias]
    parameters:
      background: 0.0
      threshold: 0.0
      leak: 0.94
      control_gain: 0.22
    read_timeout: 0.1

