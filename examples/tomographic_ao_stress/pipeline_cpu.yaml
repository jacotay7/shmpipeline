# Tomographic AO stress example (cpu profile).
#
# Fastest sustained, fully-fused three-loop workload: eight synchronized
# 256x256 WFS cameras feed one cpu.tomographic_controller that fuses
# dark/flat calibration, tiled centroids, slope calibration, the 4096x65536
# tomographic reconstruction, the leaky-integrator control law, and the final
# command clip; two independent 16x16 tip/tilt loops run at their own rates.
# The synchronized fan-in combines only WFS frames carrying a matching
# frame_id token (synchronization.mode: matching_frame_id).
#
# Self-contained: synthetic.frame_set drives the cameras (stamping one frame_id
# per generation), synthetic.array drives the tip/tilt sources, and null.sink
# stands in for the three fake hardware endpoints, so `shmpipeline run` works
# without extra code. run_benchmark.py substitutes its own instrumented
# sources/sinks and loads real calibration arrays for measurement.
#
# This file is generated; see IMPLEMENTATION_PLAN.md.

