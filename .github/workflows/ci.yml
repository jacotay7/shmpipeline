name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,gui]"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and validate distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - name: Smoke test built wheel
        run: |
          python -m venv /tmp/shmpipeline-wheel-test
          /tmp/shmpipeline-wheel-test/bin/python -m pip install --upgrade pip
          /tmp/shmpipeline-wheel-test/bin/pip install dist/*.whl
          /tmp/shmpipeline-wheel-test/bin/shmpipeline --help

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs]"

      - name: Build documentation
        run: sphinx-build -W -b html docs docs/_build/html

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Configure Qt platform
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            echo "QT_QPA_PLATFORM=offscreen" >> "$GITHUB_ENV"
          else
            echo "QT_QPA_PLATFORM=minimal" >> "$GITHUB_ENV"
          fi

      - name: Install Linux GUI runtime
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,gui]"

      - name: Run tests
        run: pytest -q

      - name: Re-run tests with full trace on Windows failure
        if: failure() && runner.os == 'Windows'
        run: pytest -q --full-trace -o faulthandler_timeout=60
